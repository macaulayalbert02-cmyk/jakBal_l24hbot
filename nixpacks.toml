# nixpacks.toml
[variables]
NIXPACKS_PYTHON_VERSION = "3.12.0"

[providers]
providers = ["python"]

[phases.setup]
nixPkgs = ["python312", "pip"]

[phases.install]
dependsOn = ["setup"]
cmds = ["python3.12 -m pip install --upgrade pip", "python3.12 -m pip install -r requirements.txt"]

[start]
cmd = "python3.12 bot.py"
